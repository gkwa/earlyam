name: new-relic-exporter
on:
  workflow_run:
    workflows:
      - "*"
    types:
      - completed
env:
  GHA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  NEW_RELIC_LICENSE_KEY: ${{ secrets.NEW_RELIC_LICENSE_KEY }}
  GHA_RUN_ID: ${{ github.event.workflow_run.id }}
  GHA_RUN_NAME: ${{ github.event.workflow_run.name }}
  GHA_DEBUG: ${{ secrets.GHA_DEBUG }}
jobs:
  new-relic-exporter:
    name: new-relic-exporter
    runs-on: ubuntu-latest
    if: ${{ always() }}
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: new-relic-exporter
        uses: newrelic-experimental/gha-new-relic-exporter@9483d54bf6e0d5030301c7d878fda01080c3ac71 # latest
